<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Polymarket Sports Filter</title>
    <link rel="stylesheet" href="popup.css" />
    <script src="../src/sportClassifier.js" defer></script>
    <script src="popup.js" defer></script>
  </head>
  <body>
    <main>
      <header>
        <h1>Sports Filter</h1>

</html>
